version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "eslint"
          - "@eslint/*"
          - "typescript"
          - "typescript-eslint"
          - "globals"
          - "@types/*"
          - "jsdom"
          - "@testing-library/*"
          - "commit-and-tag-version"
        update-types:
          - "minor"
          - "patch"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
